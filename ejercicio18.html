<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 18</title>
</head>
<body>

<script>
    // Función flecha
    const calcularMayor = (num1, num2) => {

        if (num1 > num2) {
            document.write(`El numero mayor es: ${num1}`);
        } 
        else if (num2 > num1) {
            document.write(`El numero mayor es: ${num2}`);
        } 
        else {
            document.write(`Ambos numeros son iguales: ${num1}`);
        }
    };

    // Pedir datos al usuario
    let numero1 = parseFloat(prompt("Ingrese el primer numero:"));
    let numero2 = parseFloat(prompt("Ingrese el segundo numero:"));

    // Llamar a la funcion
    calcularMayor(numero1, numero2);
</script>

</body>
</html>
