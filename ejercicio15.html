<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 15</title>
</head>

<body>
    <script>
        const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        let retornarMes = n => {
            let mes;
            if (n >= 1 && n <= 12) {
                mes = meses[n - 1];
            } else {
                mes = "El número ingresado no corresponde a un mes";
            }
            return mes;
        }

        let numero = Number(prompt("Ingrese un número del 1 al 12"));

        let resultado = retornarMes(numero);

        document.write("<h1>Resultado</h1>");
        document.write(`<p>El número ingresado ${numero}, corresponde al mes: ${resultado}</p>`);

    </script>
</body>

</html>
