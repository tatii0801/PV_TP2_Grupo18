<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // Funcion flecha 
        const sumarRango = (inicio, fin) => {
            let suma = 0;

            if (inicio > fin) {
                return `Error: el numero inicial debe ser menor o igual al final`;
            }

            for (let i = inicio; i <= fin; i++) {
                suma += i;
            }

            return suma;
        };

        // Pedir datos al usuario
        let numeroInicial = parseInt(prompt(`Ingrese el numero inicial:`));
        let numeroFinal = parseInt(prompt(`Ingrese el numero final:`));

        // Llamar a la funcion
        let resultado = sumarRango(numeroInicial, numeroFinal);

        // Mostrar resultado
        document.write(`La suma del rango es: ${resultado}`);
    </script>
</body>

</html>
