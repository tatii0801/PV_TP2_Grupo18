<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eje14</title>
</head>

<body>
    <script>
        // Función duplicar
        const duplicar = (arr) => arr.map(num => num * 2);

        // Solicitar cantidad de números
        const cantidad = parseInt(prompt("¿Cuántos números desea ingresar?"));

        // Validación básica
        if (isNaN(cantidad) || cantidad <= 0) {
            document.write("Cantidad inválida.");
        } else {
            let numeros = [];

            // Cargar array
            for (let i = 0; i < cantidad; i++) {
                const num = parseFloat(prompt(`Ingrese el número ${i + 1}:`));
                numeros.push(num);
            }

            // Duplicar valores
            const duplicados = duplicar(numeros);

            // Mostrar resultados
            document.write(`<h3>Array original:</h3> ${numeros}<br>`);
            document.write(`<h3>Array duplicado:</h3> ${duplicados}`);
        }
    </script>
</body>

</html>
